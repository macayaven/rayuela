# Project Rayuela — Multi-service architecture
# 1. rayuela: analysis environment (embeddings, TDA, visualization, JupyterLab)
# 2. vllm: Qwen 3.5 27B for Scale B semantic extraction
# 3. vllm-nemotron: Nemotron 70B for Scale B replication (inter-rater reliability)
# 4. vllm-nemotron-nano: Official NVIDIA Nemotron 3 Nano reasoning lane
#
# Usage:
#   docker compose up rayuela                      # analysis only (most sessions)
#   docker compose --profile llm up vllm           # Qwen 3.5 for Scale B
#   docker compose --profile llm-nemotron up vllm-nemotron  # Nemotron 70B for replication
#   docker compose --profile llm-nemotron-nano up vllm-nemotron-nano  # Official Nemotron 3 Nano
#   docker compose up                              # all non-profiled services

services:
  rayuela:
    build:
      context: .
      args:
        RAYUELA_USER: ${RAYUELA_USER:-carlos}
        RAYUELA_GROUP: ${RAYUELA_GROUP:-carlos}
        RAYUELA_UID: ${RAYUELA_UID:-1000}
        RAYUELA_GID: ${RAYUELA_GID:-1000}
    image: rayuela:latest
    user: "${RAYUELA_UID:-1000}:${RAYUELA_GID:-1000}"
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "32g"
    ports:
      - "8888:8888"   # JupyterLab
    volumes:
      - ./data:/workspace/rayuela/data
      - ./notebooks:/workspace/rayuela/notebooks
      - ./outputs:/workspace/rayuela/outputs
      - ./src:/workspace/rayuela/src
      - ./prompts:/workspace/rayuela/prompts
      - ~/.cache/huggingface:/home/${RAYUELA_USER:-carlos}/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HOME=/home/${RAYUELA_USER:-carlos}
      - HF_HOME=/home/${RAYUELA_USER:-carlos}/.cache/huggingface
      # vLLM runs on host network, so reach it via host gateway
      - VLLM_API_BASE=http://host.docker.internal:8000/v1
    stdin_open: true
    tty: true

  vllm:
    image: vllm/vllm-openai:cu130-nightly-aarch64   # CUDA 13.0 for Blackwell/DGX Spark + Qwen 3.5
    runtime: nvidia
    network_mode: host          # Use host networking (fixes DNS, exposes port 8000 directly)
    ipc: host                   # Shared memory for NCCL/PyTorch (equivalent to --ipc=host)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "32g"
    volumes:
      - vllm-models:/root/.cache/huggingface   # shared volume with existing cached models
    environment:
      - HF_TOKEN=${HF_TOKEN}
    # Qwen 3.5 27B dense: FP8 (~27 GB), text-only mode (skip vision encoder)
    # Entrypoint is ["vllm", "serve"], so command starts with model name
    # Flags per official docs: https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html
    command: >
      Qwen/Qwen3.5-27B-FP8
      --max-model-len 24576
      --gpu-memory-utilization 0.85
      --language-model-only
      --enable-prefix-caching
      --reasoning-parser qwen3
    profiles:
      - llm  # Only starts when explicitly requested: docker compose --profile llm up

  vllm-nemotron:
    image: vllm/vllm-openai:cu130-nightly-aarch64
    runtime: nvidia
    network_mode: host
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "32g"
    volumes:
      - vllm-models:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    # Nemotron 70B FP8: inter-rater reliability replication for Scale B
    # RedHat FP8 dynamic quant (~37 GB) — standard Llama arch, native vLLM support
    # No --language-model-only needed (pure text model, no vision encoder)
    # NOTE: Uses same port 8000 as vllm service — never run both profiles simultaneously
    command: >
      RedHatAI/Llama-3.1-Nemotron-70B-Instruct-HF-FP8-dynamic
      --max-model-len 24576
      --gpu-memory-utilization 0.85
      --enable-prefix-caching
      --max-num-seqs 4
    profiles:
      - llm-nemotron  # docker compose --profile llm-nemotron up vllm-nemotron

  vllm-nemotron-nano:
    image: vllm/vllm-openai:cu130-nightly-aarch64
    runtime: nvidia
    network_mode: host
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "32g"
    volumes:
      - vllm-models:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
      # Official NVIDIA recipe enables FlashInfer FP8 kernels for the FP8 Nano release.
      - VLLM_USE_FLASHINFER_MOE_FP8=1
    entrypoint:
      - /bin/bash
      - -lc
    # Official NVIDIA Nemotron 3 Nano vLLM path:
    # https://docs.api.nvidia.com/nim/reference/nvidia-nemotron-3-nano-30b-a3b
    # NOTE: Uses the same host port 8000 as the other vLLM services.
    command: >
      wget -q https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8/resolve/main/nano_v3_reasoning_parser.py
      -O /tmp/nano_v3_reasoning_parser.py &&
      vllm serve nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8
      --max-num-seqs 8
      --tensor-parallel-size 1
      --max-model-len 262144
      --port 8000
      --trust-remote-code
      --tool-call-parser qwen3_coder
      --reasoning-parser-plugin /tmp/nano_v3_reasoning_parser.py
      --reasoning-parser nano_v3
      --kv-cache-dtype fp8
    profiles:
      - llm-nemotron-nano  # docker compose --profile llm-nemotron-nano up vllm-nemotron-nano

volumes:
  vllm-models:
    external: true  # pre-existing volume with cached models
